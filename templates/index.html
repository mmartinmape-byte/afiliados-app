<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Programa de afiliados — Cleantech</title>
<style>
/* Paleta de marca Cleantech */
body{font-family:system-ui,-apple-system,sans-serif;background:#f4f3ff;color:#3d3d3d;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:0 0 2.5rem;text-align:center;max-width:420px;overflow:hidden}
.brand{background:linear-gradient(135deg,#1d5fd0,#3488ff);padding:1.6rem}
.brand img{height:32px}
.card-body{padding:1.8rem 2.5rem 0}
h1{color:#1d5fd0;font-size:1.3rem;margin:0 0 .6rem}
p{color:#4b5563;font-size:.9rem;line-height:1.5}
a{color:#3488ff}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><img src="/static/logo.webp" alt="Cleantech"/></div>
  <div class="card-body">
    <h1>🤝 Programa de afiliados</h1>
    <p>Si sos influencer y tenés tu link de afiliado, entrá desde el link privado que te enviamos.</p>
    <p>¿Querés sumarte? Escribinos por Instagram y vendé los productos de <a href="{{ tienda }}">somoscleantech.com.ar</a> ganando comisión por cada venta.</p>
  </div>
</div>
</body>
</html>
